# deepseek-r1-distill LLMInferenceService (+ namespace, LocalModelCache,
# ServiceMonitor, public UI route). Git-sourced. The LLMISVC's spec.router
# attaches its generated route to the internal gateway (envoy -> EPP -> vLLM).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: deepseek
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/stefanpinterBE/azure-llm.git
    targetRevision: main
    path: deepseek-r1-distill
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kserve-deepseek
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
