apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-llm-bearingpoint-com-tls
  namespace: kserve
spec:
  secretName: wildcard-llm-bearingpoint-com-tls
  issuerRef:
    name: letsencrypt-acme-dns
    kind: ClusterIssuer
  dnsNames:
    - '*.llm.bearingpoint.com'
    - llm.bearingpoint.com
