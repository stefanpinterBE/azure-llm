# Public entrypoint: single OpenAI-compatible API + LiteLLM UI.
#
# Terminates on the shared public kserve-ingress-gateway (443, wildcard cert
# *.llm.bearingpoint.com). PathPrefix "/" forwards everything to litellm, so:
#   - API : https://inference.llm.bearingpoint.com/v1/...
#   - UI  : https://inference.llm.bearingpoint.com/ui
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inference
  namespace: litellm
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: kserve-ingress-gateway
      namespace: kserve
  hostnames:
    - inference.llm.bearingpoint.com
  rules:
    # litellm emits an http-scheme 307 for the bare /ui (missing trailing
    # slash), which would downgrade browsers off TLS. Redirect it to https
    # /ui/ at the gateway before it ever reaches litellm.
    - matches:
        - path:
            type: Exact
            value: /ui
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
            path:
              type: ReplaceFullPath
              replaceFullPath: /ui/
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: litellm
          port: 4000
          weight: 1
