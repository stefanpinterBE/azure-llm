# TEMPLATE — do NOT commit real values. The live Secrets are created
# out-of-band (kubectl / sealed-secrets / external-secrets) and are gitignored,
# matching the cert/acmedns-account.yaml convention in this repo.
#
# Generate strong values once, e.g.:
#   LITELLM_MASTER_KEY="sk-$(openssl rand -hex 24)"
#   LITELLM_SALT_KEY="sk-$(openssl rand -hex 24)"   # NEVER rotate after adding models
#
#   kubectl -n litellm create secret generic litellm-masterkey \
#     --from-literal=masterkey="$LITELLM_MASTER_KEY"
#   kubectl -n litellm create secret generic litellm-env \
#     --from-literal=LITELLM_SALT_KEY="$LITELLM_SALT_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-masterkey
  namespace: litellm
type: Opaque
stringData:
  masterkey: "sk-REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-env
  namespace: litellm
type: Opaque
stringData:
  # Encrypts provider credentials stored in Postgres. Set once, never change it.
  LITELLM_SALT_KEY: "sk-REPLACE_ME"
