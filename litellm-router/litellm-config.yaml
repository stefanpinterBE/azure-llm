# ConfigMap with litellm configuration for model routing
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: kserve-litellm-router
data:
  config.yaml: |
    model_list:
      # Qwen3Coder
      - model_name: qwen3coder
        litellm_params:
          model: openai/qwen3coder
          api_base: http://qwen3coder-epp-service.kserve-qwen3coder.svc.cluster.local:9002/v1
          api_key: dummy
      - model_name: qwen
        litellm_params:
          model: openai/qwen3coder
          api_base: http://qwen3coder-epp-service.kserve-qwen3coder.svc.cluster.local:9002/v1
          api_key: dummy
      
      # DeepSeek
      - model_name: deepseek
        litellm_params:
          model: openai/deepseek
          api_base: http://deepseek-epp-service.kserve-deepseek.svc.cluster.local:9002/v1
          api_key: dummy

    general_settings:
      # No master_key = open endpoint, no API key required
      # Set master_key if you want to require authentication
      litellm_mode: "PRODUCTION"
      # Enable detailed logging for debugging
      log_level: "DEBUG"