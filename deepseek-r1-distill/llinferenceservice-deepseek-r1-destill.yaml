apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: deepseek
  namespace: kserve-deepseek
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment

spec:
  model:
    name: deepseek
    # Switched from unsloth's Q4_K_M GGUF (served via vllm-gguf-plugin) to a
    # native vLLM-compatible AWQ-4bit checkpoint, matching the qwen3coder
    # pattern. vllm-gguf-plugin is "highly experimental" and its GGUF path
    # was noticeably slower than vLLM's native AWQ/compressed-tensors
    # quantization path - no experimental plugin, no pip install at startup,
    # and no separate --tokenizer needed since this repo ships its own
    # config/tokenizer alongside the safetensors weights.
    uri: "hf://casperhansen/deepseek-r1-distill-qwen-32b-awq"

  replicas: 1

  router:
    scheduler: {}

  template:
    nodeSelector:
      kserve/localmodel: worker

    containers:
    - name: main
      image: vllm/vllm-openai:latest

      command:
      - /bin/sh
      - -c

      args:
      - |
        set -e
        exec vllm serve /mnt/models \
          --served-model-name deepseek \
          --host 0.0.0.0 \
          --port 8000 \
          --gpu-memory-utilization 0.9 \
          --max-model-len 32768

      env:
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: hf-secret
            key: HF_TOKEN
            optional: true

      ports:
      - containerPort: 8000

      securityContext:
        runAsNonRoot: false
        runAsUser: 0

      startupProbe:
        httpGet:
          path: /health
          port: 8000
        periodSeconds: 10
        failureThreshold: 180 # up to 30min: loading a 32B model

      resources:
        limits:
          cpu: "8"
          memory: 96Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "4"
          memory: 48Gi
          nvidia.com/gpu: "1"
