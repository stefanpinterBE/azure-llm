apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: deepseek
  namespace: kserve-deepseek
  annotations:
    serving.kserve.io/deploymentMode: RawDeployment

spec:
  model:
    name: deepseek
    uri: "hf://unsloth/DeepSeek-R1-Distill-Qwen-32B-GGUF"

  replicas: 1

  router:
    gateway: {}
    route: {}
    scheduler: {}

  template:
    nodeSelector:
      kserve/localmodel: worker

    containers:
    - name: main
      # Official vLLM image. No published image bundles vllm-gguf-plugin yet
      # (it's a brand-new out-of-tree plugin), so we pip install it at
      # container start rather than baking a custom image.
      image: vllm/vllm-openai:latest

      command:
      - /bin/sh
      - -c

      args:
      - |
        set -e
        pip install --no-cache-dir vllm-gguf-plugin
        exec vllm serve /mnt/models/DeepSeek-R1-Distill-Qwen-32B-Q4_K_M.gguf \
          --served-model-name deepseek \
          --tokenizer deepseek-ai/DeepSeek-R1-Distill-Qwen-32B \
          --host 0.0.0.0 \
          --port 8000 \
          --gpu-memory-utilization 0.9 \
          --max-model-len 32768

      env:
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: hf-secret
            key: HF_TOKEN
            optional: true

      ports:
      - containerPort: 8000

      securityContext:
        runAsNonRoot: false
        runAsUser: 0

      startupProbe:
        httpGet:
          path: /health
          port: 8000
        periodSeconds: 10
        failureThreshold: 180 # up to 30min: pip install + loading a 32B model

      resources:
        limits:
          cpu: "8"
          memory: 96Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "4"
          memory: 48Gi
          nvidia.com/gpu: "1"
